app = 'justthehelper'
primary_region = 'iad'

# Discord gateway bots must run a single machine (duplicate token connections
# race on interactions → DiscordAPIError 10062 / 40060).
[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3000'
  NODE_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '15s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
